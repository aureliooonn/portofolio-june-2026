<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portofolio Badut</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- laoding section -->
        <div class="loading">
            <div class="loader"></div>
        </div>

        <!-- nav section -->
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!-- main section -->
        <main>

            <!-- home section -->
            <section id="home">
                <div class="profile">
                    <h1>Hi, I'm Arrafi</h1>
                    <p>I'm a web developer</p>
                    <p>12 projects</p>
                    <p>8 clients</p>
                    <button><a href="#about">See About Me</a></button>
                    <button>
                        <a href="PDF/cv arrafi.pdf" download>See my CV</a>
                    </button>
                    <div class="profile photo">
                        <img
                            class="profile-base"
                            src="img/profile.jpeg"
                            alt="Profile Photo"
                        />
                        <img
                            class="profile-morph"
                            src="img/profile-morph.png"
                            alt="Profile Photo Morph"
                        />
                    </div>
                </div>
            </section>

            <!-- about section -->
            <section id="about">
                <h2>About Me</h2>
                <p>Learn more about my background and skills.</p>
            </section>

            <!-- projects section -->
            <section id="projects">
                <h2>My Projects</h2>
                <p>Check out some of my recent work.</p>
            </section>

            <!-- contact section -->
            <section id="contact">
                <h2>Contact Me</h2>
                <p>Get in touch with me for potential opportunities.</p>
            </section>
        </main>
    </body>
</html>
